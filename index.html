<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f8ff; /* light blue background */
            margin: 0;
            padding: 40px;
        }
        .container {
            max-width: 420px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        h1 {
            color: #007bff;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            text-align: left;
            font-weight: bold;
            color: #333333;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #cce5ff;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #qrcode {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>QR Code Generator</h1>
        <label for="account">Account No.</label>
        <input type="text" id="account" placeholder="Enter Account No.">
        <label for="ref1">Reference 1</label>
        <input type="text" id="ref1" placeholder="Enter Reference 1">
        <label for="amount">Amount in baht</label>
        <input type="number" id="amount" placeholder="Enter Amount">
        <button onclick="generateQRCode()">Generate QR Code</button>
        <div id="qrcode"></div>
    </div>
    <script>
    function generateQRCode() {
        const account = document.getElementById('account').value.trim();
        const ref1 = document.getElementById('ref1').value.trim();
        const amount = document.getElementById('amount').value.trim();

        if (!account || !ref1 || !amount) {
            alert('Please enter Account No., Reference 1, and Amount.');
            return;
        }

  const data = 'Account No.: ' + account + '\nReference 1: ' + ref1 + '\nAmount in baht: ' + amount;

        // Clear previous QR code
        document.getElementById('qrcode').innerHTML = '';

        new QRCode(document.getElementById('qrcode'), {
            text: data,
            width: 256,
            height: 256,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    }
    </script>
</body>
</html>
